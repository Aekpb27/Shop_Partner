<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGONZ | ระบบจัดการหลังบ้าน</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Anuphan:wght@400;500;600;700&display=swap');

        :root {
            --primary: #ef4444;
            --dark: #0f172a;
            --slate-50: #f8fafc;
            --slate-200: #e2e8f0;
            --slate-500: #64748b;
            --white: #ffffff;
            --green: #10b981;
            --font-main: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
            outline: none;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-tap-highlight-color: transparent;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        body {
            background: var(--slate-50);
            color: var(--dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 🔒 Ultra Minimal Login Page */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: slowFloat 30s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 800px;
            height: 800px;
            background: #fee2e2;
            top: -300px;
            left: -200px;
        }

        .orb-2 {
            width: 700px;
            height: 700px;
            background: #e0f2fe;
            bottom: -200px;
            right: -100px;
            animation-duration: 40s;
        }

        @keyframes slowFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 100px) scale(1.1);
            }
        }

        @keyframes revealDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes revealUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes simpleFade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            padding: 60px 45px;
            border-radius: 60px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.03);
            z-index: 10;
            position: relative;
        }

        .entry-1 {
            animation: revealDown 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .entry-2 {
            opacity: 0;
            animation: simpleFade 1s 0.3s forwards;
        }

        .entry-3 {
            opacity: 0;
            animation: revealUp 1s 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .entry-4 {
            opacity: 0;
            animation: revealUp 1s 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .login-logo {
            width: 90px;
            height: 90px;
            margin-bottom: 35px;
            object-fit: contain;
            filter: grayscale(0.2);
        }

        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 45px;
            color: var(--dark);
            letter-spacing: -1px;
        }

        .login-card input {
            background: rgba(248, 250, 252, 0.8);
            border: 1px solid transparent;
            margin-bottom: 12px;
            padding: 18px 25px;
            border-radius: 22px;
            font-size: 0.95rem;
            width: 100%;
            transition: all 0.4s;
            font-weight: 600;
        }

        .login-card input:focus {
            background: white;
            border-color: var(--slate-200);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        /* 🏰 Sidebar Styling */
        .sidebar {
            width: 280px;
            background: var(--white);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--slate-200);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
            z-index: 100;
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .sidebar.collapsed {
            width: 85px;
            padding: 40px 10px;
            overflow: visible;
        }

        .sidebar.collapsed .logo span,
        .sidebar.collapsed .nav-btn span,
        .sidebar.collapsed .status-container span:not(.status-dot),
        .sidebar.collapsed .logout-btn .btn span {
            display: none !important;
        }

        .sidebar.collapsed .status-container,
        .sidebar.collapsed .logout-btn .btn {
            justify-content: center;
            gap: 0;
            padding: 10px 0;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 45px;
            text-align: center;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            overflow: hidden;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .nav-btn {
            padding: 16px 20px;
            border-radius: 15px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-weight: 600;
            color: var(--slate-500);
            margin-bottom: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-btn:hover {
            background: var(--slate-50);
            color: var(--dark);
        }

        .nav-btn.active {
            background: #fff1f2;
            color: var(--primary);
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .menu-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            transition: 0.3s;
            flex-shrink: 0;
        }

        /* 🔘 Toggle Button (Half-Circle Position) */
        .sidebar-toggle {
            position: absolute;
            top: 25px;
            right: -15px;
            width: 30px;
            height: 30px;
            background: var(--white);
            border: 1px solid var(--slate-200);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            z-index: 110;
            transition: 0.4s;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--slate-500);
        }

        .sidebar-toggle:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .sidebar.collapsed .sidebar-toggle {
            transform: rotate(180deg);
        }

        /* 📟 Sidebar Footer & Log Control */
        .logout-btn {
            margin-top: auto;
            padding-top: 25px;
            border-top: 1px solid var(--slate-200);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .logout-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            color: #64748b;
            padding: 8px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .status-container:hover {
            background: var(--slate-50);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            transition: background 0.3s;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        #log-console {
            background: #020617;
            color: #94a3b8;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.65rem;
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .sidebar.collapsed #log-console {
            display: none !important;
        }

        /* 🏛️ Main Content Area */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            gap: 15px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--white);
            padding: 22px;
            border-radius: 24px;
            border: 1px solid var(--slate-200);
            position: relative;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .item-card:active {
            transform: scale(0.98);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-dark {
            background: var(--dark);
            color: white;
        }

        .btn-del {
            color: #ef4444;
            background: #fff1f2;
        }

        /* 📦 Modals Styling */
        @keyframes modalPop {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(40px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes modalHide {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            100% {
                opacity: 0;
                transform: scale(0.8) translateY(40px);
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .modal-card {
            background: white;
            padding: 35px;
            border-radius: 32px;
            width: 550px;
            max-width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-card.compact {
            width: 420px;
        }

        .modal-card.closing {
            animation: modalHide 0.3s ease-in forwards;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--slate-500);
            margin-top: 20px;
            display: block;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: 1.5px solid var(--slate-200);
            border-radius: 15px;
            background: var(--slate-50);
            font-weight: 600;
            font-size: 1rem;
        }

        .partner-pill {
            padding: 10px 18px;
            border-radius: 100px;
            background: var(--slate-50);
            border: 1.5px solid var(--slate-200);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 4px;
            display: inline-block;
        }

        .partner-pill.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }

        .preview-box {
            width: 110px;
            height: 110px;
            background: var(--slate-50);
            border-radius: 20px;
            margin: 0 auto 25px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 2px dashed var(--slate-200);
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-footer {
            margin-top: 35px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 15px;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            background: white;
            padding: 16px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            animation: modalPop 0.4s ease-out forwards;
            border: 1px solid var(--slate-200);
        }

        /* 🔔 Right Side Notification */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 350px;
        }

        .order-alert {
            background: white;
            color: var(--dark);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            animation: slideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--slate-200);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .order-alert h4 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-alert p {
            font-size: 0.9rem;
            color: var(--slate-500);
            font-weight: 600;
        }

        .order-alert .close-alert {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            opacity: 0.4;
            color: var(--dark);
            font-size: 1.2rem;
            z-index: 10;
        }

        .order-alert .close-alert:hover {
            opacity: 1;
        }

        /* ⏳ Progress Timer Bar */
        .timer-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--slate-50);
        }

        .timer-bar {
            height: 100%;
            background: var(--primary);
            width: 100%;
            animation: timerRun 10s linear forwards;
        }

        @keyframes timerRun {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 12px 15px;
                flex-direction: row;
                border-right: none;
                border-bottom: 1px solid var(--slate-200);
                overflow-x: auto;
                position: sticky;
                top: 0;
                background: var(--white);
            }

            .sidebar.collapsed {
                width: 100%;
                padding: 12px 15px;
                overflow: visible;
            }

            .sidebar-toggle {
                display: none;
            }

            .logo {
                margin-bottom: 0;
                margin-right: 15px;
                font-size: 1.3rem;
            }

            .logo span {
                display: none;
            }

            .nav-btn {
                padding: 10px 16px;
                font-size: 0.85rem;
                margin-bottom: 0;
                width: auto;
                gap: 8px;
            }

            .nav-btn span {
                display: inline;
            }

            .logout-btn {
                display: none;
            }

            .modal-card {
                width: 100% !important;
                border-radius: 24px;
                padding: 25px;
            }

            .modal-footer {
                grid-template-columns: 1fr;
                display: flex;
                flex-direction: column-reverse;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>
    <div id="notification-container"></div>

    <!-- 🔒 Login Page -->
    <div id="login-overlay" class="hidden">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="login-card">
            <div class="entry-1"><img src="/assets/logo.png" class="login-logo"></div>
            <h2 class="entry-2">Dragonz Admin</h2>
            <div class="entry-3">
                <input type="email" id="login-email" placeholder="อีเมลแอดมิน">
                <div style="position: relative; width: 100%; margin-bottom: 12px;">
                    <input type="password" id="login-password" placeholder="รหัสผ่าน"
                        style="padding-right: 55px; margin-bottom: 0;">
                    <span id="toggle-eye" onclick="togglePass()"
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; opacity: 0.4;">👁️</span>
                </div>
            </div>
            <div class="entry-4"><button class="btn btn-dark"
                    style="width:100%; padding: 20px; justify-content: center; border-radius: 22px;"
                    onclick="handleLogin()">เข้าสู่ระบบจัดการ</button></div>
        </div>
    </div>

    <!-- 📦 CRUD Modal -->
    <div id="item-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 id="modal-title">แก้ไขข้อมูล</h2>
            <div id="modal-form-content"></div>
            <div class="modal-footer">
                <button class="btn btn-dark" style="justify-content: center;" onclick="closeModal()">ยกเลิก</button>
                <button class="btn btn-primary" style="justify-content: center;"
                    onclick="saveModalItem()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <!-- ✨ QR Code Modal -->
    <div id="qr-modal" class="modal-overlay hidden" onclick="closeQrModal()">
        <div id="qr-modal-content"></div>
    </div>

    <!-- ⚠️ Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-card compact" style="text-align: center;">
            <div style="font-size: 3.5rem; margin-bottom: 20px; display: flex; justify-content: center;">⚠️</div>
            <h2 id="confirm-title">ยืนยันการดำเนินการ</h2>
            <p id="confirm-msg"
                style="color: var(--slate-500); font-weight: 600; margin-bottom: 25px; line-height: 1.6;">
                คุณต้องการทำรายการนี้ใช่หรือไม่?</p>
            <div class="modal-footer">
                <button class="btn btn-dark" style="justify-content: center;"
                    onclick="closeConfirmModal()">ยกเลิก</button>
                <button id="confirm-submit-btn" class="btn btn-primary" style="justify-content: center;">ยืนยัน</button>
            </div>
        </div>
    </div>

    <!-- 🏰 UI Structure -->
    <div id="dashboard-ui" class="hidden" style="display: flex; width: 100%; height: 100%;">
        <div class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
            <div class="logo"><img src="/assets/logo.png" class="logo-img"> <span>DRAGONZ</span></div>

            <button class="nav-btn" data-tab="orders" onclick="showTab('orders')">
                <img src="/assets/orders.png" class="menu-icon"> <span>รายการสั่งซื้อ</span>
            </button>
            <button class="nav-btn" data-tab="products" onclick="showTab('products')">
                <img src="/assets/products.png" class="menu-icon"> <span>จัดการสินค้า</span>
            </button>
            <button class="nav-btn" data-tab="partners" onclick="showTab('partners')">
                <img src="/assets/partner.png" class="menu-icon"> <span>พาร์ทเนอร์</span>
            </button>
            <button class="nav-btn" data-tab="categories" onclick="showTab('categories')">
                <img src="/assets/category.png" class="menu-icon"> <span>หมวดหมู่</span>
            </button>
            <button class="nav-btn" data-tab="transactions" onclick="showTab('transactions')">
                <img src="/assets/transaction.png" class="menu-icon"> <span>จัดการโอนเงิน</span>
            </button>

            <div class="logout-btn">
                <div class="status-container"
                    onclick="document.getElementById('log-console').classList.toggle('hidden')">
                    <span id="status-dot" class="status-dot" style="background: #cbd5e1;"></span>
                    <span>Log การเชื่อมต่อ</span>
                </div>
                <div id="log-console" class="hidden">
                    <div id="log-content"></div>
                </div>
                <button class="btn"
                    style="width: 100%; color: var(--slate-500); background: var(--slate-50); justify-content: center; padding: 12px 0;"
                    onclick="logout()">
                    <img src="/assets/logout.png" style="width:20px; margin-right:10px;"> <span>ออกจากระบบ</span>
                </button>
            </div>
        </div>

        <div class="main">

    <script>
        // 🔐 Supabase Configuration (Realtime)
        const SB_URL = 'https://mpqasqznmxejmaxcpolr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wcWFzcXpubXhlam1heGNwb2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTgyNTgsImV4cCI6MjA4NTE5NDI1OH0.nVE8IWiCikPO4s7UU36HgSqfddtr_YAeWnAAWUZAiyE';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let db = { products: [], partners: [], categories: [], orders: [], payment: { id: 'promptpay', account_name: '', promptpay_number: '' } };
        let activeModal = { type: '', id: null, data: {} };

        // 🔊 Audio Management
        const notificationAudio = new Audio('/assets/alert.mp3');
        notificationAudio.loop = true;
        let activeAlertCount = 0;

        // Unlock Audio for Browser Policy
        document.addEventListener('click', () => {
            notificationAudio.play().then(() => {
                notificationAudio.pause();
                console.log("Audio Unlocked");
            }).catch(e => { });
        }, { once: true });

        function showToast(m, t = 'success') {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast ${t}`;
            el.innerHTML = `<span>${t === 'success' ? '✅' : '❌'}</span> <span>${m}</span>`;
            c.appendChild(el);
            setTimeout(() => {
                if (el.parentElement) {
                    el.style.opacity = '0'; setTimeout(() => el.remove(), 400);
                }
            }, 3000);
        }

        // 🔔 Function to show floating order alert
        function showOrderAlert(order) {
            const container = document.getElementById('notification-container');
            const alertEl = document.createElement('div');
            alertEl.className = 'order-alert';

            // 🔊 Start sound if it's the first alert
            activeAlertCount++;
            notificationAudio.play().catch(e => {
                console.log("Audio blocked - interaction needed");
                showToast("มีออเดอร์ใหม่! (คลิกที่หน้าจอเพื่อเปิดเสียง)", "info");
            });

            // หาชื่อร้านแทน ID
            const pId = order.partnerId || order.partner_id;
            const partner = db.partners.find(p => p.id == pId);
            const partnerDisplay = partner ? partner.name : (pId || 'ไม่ทราบชื่อร้าน');

            // ดึงข้อมูลสินค้าตัวแรกมาโชว์รูป
            const firstItem = (order.items && order.items.length > 0) ? order.items[0] : null;

            alertEl.innerHTML = `
                <div class="close-alert">✕</div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div style="width: 50px; height: 50px; border-radius: 12px; background: var(--slate-50); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; border: 1px solid var(--slate-100);">
                        ${firstItem && firstItem.imageUrl ? `<img src="${firstItem.imageUrl}" style="width:100%; height:100%; object-fit:cover;">` : `<span style="font-size:1.5rem;">${firstItem ? (firstItem.emoji || '🔔') : '🔔'}</span>`}
                    </div>
                    <div style="flex: 1;">
                        <h4 style="margin: 0; font-size: 1rem; font-weight: 800; color: var(--primary);">มีออเดอร์ใหม่เข้า!</h4>
                        <p style="font-size: 0.8rem; color: var(--slate-500); margin: 2px 0;">ออเดอร์ #${order.id} จาก: <strong>${partnerDisplay}</strong></p>
                        <p style="font-weight: 800; color: var(--dark); font-size: 0.9rem;">ยอดรวม: ฿${(order.total || 0).toLocaleString()}</p>
                    </div>
                </div>
                <div class="timer-bar-container">
                    <div class="timer-bar"></div>
                </div>
            `;
            container.appendChild(alertEl);

            // 🛑 Function to stop sound and remove element
            const stopAndRemove = () => {
                if (alertEl.dataset.stopped) return;
                alertEl.dataset.stopped = "true";

                activeAlertCount--;
                if (activeAlertCount <= 0) {
                    activeAlertCount = 0;
                    notificationAudio.pause();
                    notificationAudio.currentTime = 0;
                }

                if (alertEl.parentElement) {
                    alertEl.style.opacity = '0';
                    alertEl.style.transform = 'translateX(50px)';
                    setTimeout(() => alertEl.remove(), 500);
                }
            };

            // คลิกปิดเพื่อหยุดเสียงและปิดแจ้งเตือน
            alertEl.querySelector('.close-alert').onclick = stopAndRemove;

            // Auto remove after 10 seconds (and stop sound)
            setTimeout(stopAndRemove, 10000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar_collapsed', sidebar.classList.contains('collapsed'));
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showToast("กรุณากรอกข้อมูลให้ครบ", "error"); return; }
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) { showToast(error.message || "อีเมลหรือรหัสผ่านไม่ถูกต้อง", "error"); }
                else { localStorage.setItem('dragonz_session', 'true'); location.reload(); }
            } catch (e) { showToast("ไม่สามารถเชื่อมต่อ Supabase ได้", "error"); }
        }

        function logout() {
            showConfirm('ออกจากระบบ?', 'คุณต้องการออกจากระบบจัดการใช่หรือไม่?', async () => {
                await supabaseClient.auth.signOut();
                localStorage.clear();
                location.reload();
            });
        }
        function togglePass() {
            const passInput = document.getElementById('login-password');
            const eyeIcon = document.getElementById('toggle-eye');
            if (passInput.type === 'password') { passInput.type = 'text'; eyeIcon.innerText = '🫣'; }
            else { passInput.type = 'password'; eyeIcon.innerText = '👁️'; }
        }

        function addLog(msg, type = 'info') {
            const el = document.getElementById('log-content');
            if (!el) return;
            const color = type === 'error' ? '#f87171' : (type === 'success' ? '#34d399' : '#94a3b8');
            el.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('dragonz_session')) {
                document.getElementById('dashboard-ui').classList.remove('hidden');
                if (localStorage.getItem('sidebar_collapsed') === 'true') document.getElementById('sidebar').classList.add('collapsed');
                loadData().then(() => {
                    showTab(localStorage.getItem('active_tab') || 'orders');

                    // 🚀 Start Realtime Listening
                    addLog("กำลังเปิดระบบ Realtime Order Sync...", "info");
                    const orderChannel = supabaseClient
                        .channel('any-db-changes')
                        .on(
                            'postgres_changes',
                            { event: 'INSERT', schema: 'public', table: 'orders' },
                            (payload) => {
                                console.log('New Order Payload:', payload);
                                addLog("📢 ได้รับออเดอร์ใหม่!", "success");
                                showOrderAlert(payload.new);
                                loadData(); // Refresh list
                            }
                        )
                        .subscribe((status) => {
                            if (status === 'SUBSCRIBED') {
                                addLog("✅ ระบบ Realtime พร้อมทำงาน!", "success");
                            } else if (status === 'CHANNEL_ERROR') {
                                addLog("❌ Realtime Error: อาจติดปัญหา RLS หรือสิทธิ์การเข้าถึง", "error");
                            } else {
                                console.log('Realtime Status:', status);
                            }
                        });
                });
            } else { document.getElementById('login-overlay').classList.remove('hidden'); }
        });

        async function loadData() {
            let connected = true;
            addLog("กำลังดึงข้อมูลจาก Supabase...");
            
            try {
                const results = await Promise.all([
                    supabaseClient.from('products').select('*').order('id', { ascending: true }),
                    supabaseClient.from('partners').select('*'),
                    supabaseClient.from('categories').select('*').order('order_index', { ascending: true }),
                    supabaseClient.from('orders').select('*').order('timestamp', { ascending: false }),
                    supabaseClient.from('payment').select('*')
                ]);

                const [prod, part, cat, ord, pay] = results;

                if (prod.error || part.error || cat.error || ord.error) {
                    connected = false;
                    addLog("เกิดข้อผิดพลาดในการดึงข้อมูลบางส่วน", "error");
                }

                db.products = prod.data || [];
                db.partners = part.data || [];
                db.categories = cat.data || [];
                db.orders = (ord.data || []).map(o => {
                    if (typeof o.items === 'string') {
                        try { o.items = JSON.parse(o.items); } catch (e) { o.items = []; }
                    }
                    return o;
                });
                db.payment = pay.data?.find(p => p.id === 'promptpay') || { id: 'promptpay', account_name: '', promptpay_number: '' };

                addLog(`โหลดข้อมูลสำเร็จ (สินค้า ${db.products.length}, ออเดอร์ ${db.orders.length})`, 'success');

            } catch (e) {
                connected = false;
                addLog(`ระบบขัดข้อง: ${e.message}`, 'error');
            }

            // 🏷️ Populate Partner Filter
            const filterSelect = document.getElementById('filter-partner');
            if (filterSelect) {
                filterSelect.innerHTML = '<option value="">แสดงทุกร้านค้า (All Partners)</option>';
                db.partners.forEach(p => {
                    filterSelect.innerHTML += `<option value="${p.id}">${p.name} (${p.id})</option>`;
                });
            }

            // 🏷️ Populate Product Category Filter
            const prodCatSelect = document.getElementById('filter-product-category');
            if (prodCatSelect) {
                prodCatSelect.innerHTML = '<option value="">แสดงทุกหมวดหมู่</option>';
                db.categories.forEach(c => {
                    prodCatSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                });
            }

            const dot = document.getElementById('status-dot');
            if (dot) dot.style.background = connected ? '#10b981' : '#ef4444';
            renderAll();
        }

            document.getElementById('filter-date').value = "";

            localStorage.setItem('active_tab', tabName);
            ['orders', 'products', 'partners', 'categories', 'transactions'].forEach(t => {
                const sec = document.getElementById('section-' + t);
                if (sec) sec.classList.add('hidden');
                const btn = document.querySelector(`.nav-btn[data-tab="${t}"]`);
                if (btn) btn.classList.remove('active');
            });

            if (activeSec) activeSec.classList.remove('hidden');
            const activeBtn = document.querySelector(`.nav-btn[data-tab="${tabName}"]`);
            if (activeBtn) activeBtn.classList.add('active');

        function openModal(type, id = null) {
            activeModal.type = type;
            activeModal.id = id;
            const modalBox = document.querySelector('#item-modal .modal-card');
            if (type === 'products') modalBox.classList.remove('compact'); else modalBox.classList.add('compact');

            if (id) {
                const item = db[type].find(i => i.id == id);
                activeModal.data = JSON.parse(JSON.stringify(item));

                // 🛑 CRITICAL: Ensure category_names is an array
                if (type === 'partners') {
                    if (!activeModal.data.category_names) {
                        activeModal.data.category_names = [];
                    } else if (typeof activeModal.data.category_names === 'string') {
                        try {
                            activeModal.data.category_names = JSON.parse(activeModal.data.category_names);
                        } catch (e) {
                            activeModal.data.category_names = activeModal.data.category_names.split(',').map(s => s.trim());
                        }
                    }
                    if (!Array.isArray(activeModal.data.category_names)) {
                        activeModal.data.category_names = [];
                    }
                }

                document.getElementById('modal-title').innerText = `แก้ไข${type === 'products' ? 'สินค้า' : type === 'partners' ? 'พาร์ทเนอร์' : 'หมวดหมู่'}`;
            } else {
                activeModal.data = type === 'products' ? { id: Date.now(), name: '', price: 0, partnerIds: [], category: '', imageUrl: '', emoji: '🍹' } :
                    type === 'partners' ? { id: 'shop-' + Math.floor(100000 + Math.random() * 900000), name: '', category_names: [] } :
                        { id: Date.now(), name: '', order_index: 0 };
                document.getElementById('modal-title').innerText = `เพิ่มใหม่`;
            }
            renderModalForm();
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function renderModalForm() {
            const content = document.getElementById('modal-form-content');

                content.innerHTML = `
                    <div class="preview-box" id="modal-preview">${d.imageUrl ? `<img src="${d.imageUrl}">` : d.emoji}</div>
                    <label>รูปสินค้า</label><input type="file" onchange="handleModalUpload(this)">

                        <div><label>ราคา</label><input type="number" value="${d.price}" onchange="activeModal.data.price=Number(this.value)"></div>
                        <div><label>หมวดหมู่</label><select onchange="activeModal.data.category=this.value">

                    </div>`;
            } else if (activeModal.type === 'partners') {
                const selectedNames = Array.isArray(d.category_names) ? d.category_names : [];
                content.innerHTML = `
                    <label>รหัสร้าน (ID)</label><input value="${d.id}" oninput="activeModal.data.id=this.value" ${activeModal.id ? 'readonly' : ''}>
                    <label>ชื่อร้าน</label><input value="${d.name}" oninput="activeModal.data.name=this.value">
                    <label>หมวดหมู่ที่จะแสดงในร้านนี้ (คลิกเพื่อเลือก)</label>
                    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px">
                        ${db.categories.map(c => {
                    const isActive = selectedNames.includes(c.name);
                    return `<div class="partner-pill ${isActive ? 'active' : ''}" data-name="${c.name}" onclick="togglePartnerCategory('${c.name}', this)">${c.name}</div>`;
                }).join('')}
                    </div>`;
            } else {
                content.innerHTML = `<label>ชื่อหมวดหมู่</label><input value="${d.name}" onchange="activeModal.data.name=this.value">`;
            }
        }

        function toggleModalPart(id, el) {
            if (!activeModal.data.partnerIds) activeModal.data.partnerIds = [];
            const i = activeModal.data.partnerIds.indexOf(id);
            if (i > -1) { activeModal.data.partnerIds.splice(i, 1); el.classList.remove('active'); }
            else { activeModal.data.partnerIds.push(id); el.classList.add('active'); }
        }

        function togglePartnerCategory(name, el) {
            if (!activeModal.data.category_names) activeModal.data.category_names = [];
            const names = activeModal.data.category_names;
            const idx = names.indexOf(name);
            if (idx > -1) {
                names.splice(idx, 1);
                el.classList.remove('active');
            } else {
                names.push(name);
                el.classList.add('active');
            }
        }

        async function handleModalUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            showToast('กำลังอัปโหลดรูปภาพ...', 'info');
            const fileExt = file.name.split('.').pop();
            const fileName = `products/${Date.now()}.${fileExt}`;

            try {
                const { data, error } = await supabaseClient.storage
                    .from('product-images')
                    .upload(fileName, file);

                if (error) throw error;

                const { data: urlData } = supabaseClient.storage
                    .from('product-images')
                    .getPublicUrl(fileName);

                activeModal.data.imageUrl = urlData.publicUrl;
                document.getElementById('modal-preview').innerHTML = `<img src="${urlData.publicUrl}">`;
                showToast('อัปโหลดรูปภาพสำเร็จ');
            } catch (e) {
                showToast('อัปโหลดล้มเหลว: ' + e.message, 'error');
            }
        }

        async function updateStatus(id, status) {
            try {
                const { error } = await supabaseClient.from('orders').update({ status }).eq('id', id);
                if (!error) {
                    showToast(`อัปเดตสถานะเป็น ${status === 'preparing' ? 'กำลังทำ' : 'พร้อมรับ'} สำเร็จ`);
                    loadData();
                } else {
                    showToast('อัปเดตสถานะไม่สำเร็จ: ' + error.message, 'error');
                }
            } catch (e) {
                showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
            }
        }

        async function saveModalItem() {
            const type = activeModal.type;
            const currentData = activeModal.data;

            if (type === 'partners' && (!currentData.id || !currentData.name)) {
                showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
                return;
            }

            try {
                const { error } = await supabaseClient.from(type).upsert(currentData);

                if (!error) {
                    showToast('บันทึกสำเร็จ');
                    closeModal();
                    setTimeout(loadData, 500);
                } else {
                    showToast('บันทึกไม่สำเร็จ: ' + error.message, 'error');
                }
            } catch (e) {
                showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
            }
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const card = modal.querySelector('.modal-card');
            card.classList.add('closing');
            setTimeout(() => { modal.classList.add('hidden'); card.classList.remove('closing'); }, 300);
        }

        function showConfirm(title, msg, onConfirm) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            const btn = document.getElementById('confirm-submit-btn');
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.onclick = () => { onConfirm(); closeConfirmModal(); };
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        async function addPpNumber() {
            const nameEl = document.getElementById('new-pp-name');
            const numEl = document.getElementById('new-pp-input');
            const name = nameEl.value.trim();
            const num = numEl.value.trim().replace(/\D/g, '');

            if (!name || !num) { showToast("กรุณากรอกชื่อและเลขพร้อมเพย์", "error"); return; }
            if (num.length !== 10 && num.length !== 13) { showToast("เลขพร้อมเพย์ต้องมี 10 หรือ 13 หลักเท่านั้น", "error"); return; }

            await savePaymentSettings(name, num);
            nameEl.value = ''; numEl.value = '';
        }

        async function removePpNumber() {
            showConfirm('เปลี่ยนข้อมูลการโอนเงิน?', 'คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลชุดนี้เพื่อตั้งค่าใหม่?', async () => {
                try {
                    const { error } = await supabaseClient.from('payment').delete().eq('id', 'promptpay');
                    if (!error) {
                        showToast('ลบข้อมูลการโอนเงินสำเร็จ');
                        await loadData();
                    } else {
                        showToast('ไม่สามารถลบข้อมูลได้: ' + error.message, 'error');
                    }
                } catch (e) {
                    showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
                }
            });
        }

        async function savePaymentSettings(name, num) {
            try {
                const res = await fetch('/api/payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: 'promptpay', account_name: name, promptpay_number: num })
                });
                const result = await res.json();
                if (res.ok && result.success) { showToast("บันทึกสำเร็จ"); await loadData(); }
                else showToast("บันทึกไม่สำเร็จ", "error");
            } catch (e) { showToast("Error: " + e.message, "error"); }
        }

                    ` : ''}
                    ${o.status === 'waiting' || o.status === 'preparing' ? `
                        <button class="btn btn-dark" style="padding: 8px 12px; font-size: 0.8rem; border-radius: 10px;" onclick="updateStatus('${o.id}', 'ready')">เสร็จแล้ว</button>
                    ` : ''}
                </div>

            </div>
            
        </div>
        `;
                        }).join('')}
</div>`;
                    }
                }

                // 5. Draw PromptPay Settings
                const ppListEl = document.getElementById('pp-list');
                const ppInputContainer = document.getElementById('pp-input-container');
                if (ppListEl) {
                    const name = db.payment?.account_name || '';
                    const num = db.payment?.promptpay_number || '';
                    const badge = document.getElementById('pp-count-badge');
                    if (badge) badge.innerText = `${num ? 1 : 0}/1`;

                    if (num) {
                        ppInputContainer.classList.add('hidden');
                        ppListEl.innerHTML = `
                            <div class="payment-display-card" style="background: white; border-radius: 28px; border: 1px solid var(--slate-200); padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.02);">
                                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--slate-200);">
                                    <div style="width: 60px; height: 60px; background: #eff6ff; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem;">📱</div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.8rem; color: var(--slate-500); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">ข้อมูลพร้อมเพย์</div>
                                        <div style="font-size: 1.3rem; font-weight: 800; color: var(--dark); letter-spacing: 1px;">${num}</div>
                                        <div style="font-size: 1rem; font-weight: 600; color: var(--slate-500);">${name}</div>
                                    </div>
                                </div>
                                <div style="text-align: center; background: var(--slate-50); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
                                    <img src="https://promptpay.io/${num}.png" style="width: 150px; height: 150px; border-radius: 10px; border: 4px solid white;">
                                </div>
                                <button class="btn btn-del" style="width: 100%; justify-content: center; height: 50px; font-weight: 800;" onclick="removePpNumber()">
                                    🔧 เปลี่ยนข้อมูล / แก้ไข
                                </button>
                            </div>`;
                    } else {
                        ppInputContainer.classList.remove('hidden');
                        ppListEl.innerHTML = '<div style="padding:40px; opacity:0.5; text-align:center; font-weight: 600;">ยังไม่มีการตั้งค่า</div>';
                    }
                }

            } catch (err) {
                console.error("Render Error:", err);
                addLog("เกิดข้อผิดพลาดในการวาดหน้าจอ: " + err.message, "error");
            }
        }
        function showQrModal(partnerId, partnerName) {
            const modal = document.getElementById('qr-modal');
            const url = `${window.location.origin}/store/${partnerId}`;
            modal.innerHTML = `
                <div class="modal-card compact" style="text-align: center;" onclick="event.stopPropagation()">
                    <h2 style="margin-bottom: 20px;">QR Code สำหรับ ${partnerName}</h2>
                    <div style="background: white; padding: 20px; border-radius: 25px; display: inline-block; margin: 0 auto;"><canvas id="qr-canvas" style="width: 100% !important; height: auto !important; max-width: 250px; display: block;"></canvas></div>
                    <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 20px; word-break: break-all;">${url}</p>
                    <div style="margin-top: 25px;"><button class="btn btn-dark" style="width: 100%; justify-content: center;" onclick="closeQrModal()">ปิดหน้าต่าง</button></div>
                </div>`;
            QRCode.toCanvas(modal.querySelector('#qr-canvas'), url, { width: 250, margin: 2 });
            modal.classList.remove('hidden');
        }
        function closeQrModal() { document.getElementById('qr-modal').classList.add('hidden'); }
        async function deleteItem(type, id) {
            showConfirm('ลบข้อมูลนี้?', `คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลชุดนี้? การดำเนินการนี้ไม่สามารถย้อนกลับได้`, async () => {
                try {
                    const { error } = await supabaseClient.from(type).delete().eq('id', id);
                    if (!error) {
                        showToast('ลบข้อมูลสำเร็จ');
                        loadData();
                    } else {
                        showToast('ไม่สามารถลบข้อมูลได้: ' + error.message, 'error');
                    }
                } catch (e) {
                    showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
                }
            });
        }
    </script>
</body>

</html>
