<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGONZ | ระบบจัดการหลังบ้าน</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Anuphan:wght@400;500;600;700&display=swap');
        :root { --primary: #ef4444; --dark: #0f172a; --slate-50: #f8fafc; --slate-200: #e2e8f0; --slate-500: #64748b; --white: #ffffff; --green: #10b981; --font-main: 'Anuphan', 'Plus Jakarta Sans', sans-serif; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); outline: none; scrollbar-width: none; -ms-overflow-style: none; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }
        body { background: var(--slate-50); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }
        
        /* 🔒 Login Page */
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 45px; border-radius: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .login-logo { width: 90px; height: 90px; margin-bottom: 25px; object-fit: contain; }
        
        /* 🏰 Sidebar */
        .sidebar { width: 280px; background: var(--white); padding: 40px 20px; display: flex; flex-direction: column; border-right: 1px solid var(--slate-200); box-shadow: 10px 0 30px rgba(0,0,0,0.02); z-index: 100; flex-shrink: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .sidebar.collapsed { width: 85px; padding: 40px 10px; }
        
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: 45px; text-align: center; letter-spacing: -1.5px; display: flex; align-items: center; justify-content: center; gap: 12px; overflow: hidden; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; }
        .sidebar.collapsed .logo span { display: none; }
        .sidebar.collapsed .logo-img { width: 35px; height: 35px; }

        .nav-btn { padding: 16px 20px; border-radius: 15px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-weight: 600; color: var(--slate-500); margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 15px; font-size: 1rem; white-space: nowrap; overflow: hidden; }
        .nav-btn:hover { background: var(--slate-50); color: var(--dark); }
        .nav-btn.active { background: #fff1f2; color: var(--primary); border: 1px solid rgba(239, 68, 68, 0.1); }
        
        .menu-icon { width: 26px; height: 26px; object-fit: contain; transition: 0.3s; filter: none !important; }
        .nav-btn:hover .menu-icon { transform: scale(1.1); }
        
        /* 🚪 Logout Styling */
        .logout-btn { margin-top: auto; padding-top: 25px; border-top: 1px solid var(--slate-200); display: flex; flex-direction: column; gap: 15px; }
        .logout-icon { width: 22px; height: 22px; object-fit: contain; margin-right: 10px; transition: 0.3s; } 
        .sidebar.collapsed .nav-btn { justify-content: center; padding: 16px 0; }
        .sidebar.collapsed .nav-btn span { display: none; }
        .sidebar.collapsed .logout-icon { margin-right: 0; width: 24px; height: 24px; }
        .sidebar.collapsed .logout-text { display: none !important; }

        .sidebar-toggle { position: absolute; top: 15px; right: -15px; width: 30px; height: 30px; background: var(--white); border: 1px solid var(--slate-200); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 110; transition: 0.3s; }
        .sidebar-toggle:hover { background: var(--primary); color: white; }
        .sidebar.collapsed .sidebar-toggle { transform: rotate(180deg); }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; gap: 15px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; }
        
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .item-card { background: var(--white); padding: 22px; border-radius: 24px; border: 1px solid var(--slate-200); position: relative; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; gap: 10px; }
        .item-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
        .item-card:active { transform: scale(0.98); }
        
        .btn { padding: 12px 24px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-del { color: #ef4444; background: #fff1f2; }

        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.8) translateY(40px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes modalHide { 0% { opacity: 1; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(0.8) translateY(40px); } }
        @keyframes overlayFade { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(8px); } }
        @keyframes overlayHide { from { opacity: 1; backdrop-filter: blur(8px); } to { opacity: 0; backdrop-filter: blur(0px); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 15px; animation: overlayFade 0.3s ease-out forwards; }
        .modal-overlay.closing { animation: overlayHide 0.3s ease-in forwards; }
        .modal-card { background: white; padding: 35px; border-radius: 32px; width: 550px; max-width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal-card.compact { width: 420px; }
        .modal-card.closing { animation: modalHide 0.3s ease-in forwards; }
        
        .modal-card h2 { font-weight: 800; margin-bottom: 25px; font-size: 1.8rem; letter-spacing: -1px; }
        label { font-size: 0.85rem; font-weight: 700; color: var(--slate-500); margin-top: 20px; display: block; }
        input, select { width: 100%; padding: 14px; margin-top: 8px; border: 1.5px solid var(--slate-200); border-radius: 15px; background: var(--slate-50); font-weight: 600; font-size: 1rem; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }

        .partner-pill { padding: 10px 18px; border-radius: 100px; background: var(--slate-50); border: 1.5px solid var(--slate-200); cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.2s; color: var(--slate-500); }
        .partner-pill.active { background: var(--dark); color: white; border-color: var(--dark); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .preview-box { width: 110px; height: 110px; background: var(--slate-50); border-radius: 20px; margin: 0 auto 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 3rem; border: 2px dashed var(--slate-200); }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .modal-footer { margin-top: 35px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; }

        /* ✨ Smart Status Indicator */
        .status-container { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; font-weight: 700; font-size: 0.75rem; color: #64748b; margin-bottom: 10px; }
        .sidebar.collapsed .status-container span:last-child { display: none; }
        .sidebar.collapsed .status-container { justify-content: center; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.1); flex-shrink: 0; }
        
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; }
        .toast { background: white; padding: 16px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; font-weight: 700; animation: modalPop 0.4s ease-out forwards; border: 1px solid var(--slate-200); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 12px 15px; flex-direction: row; border-right: none; border-bottom: 1px solid var(--slate-200); overflow-x: auto; position: sticky; top: 0; background: var(--white); }
            .sidebar.collapsed { width: 100%; padding: 12px 15px; }
            .sidebar-toggle { display: none; }
            .logo { margin-bottom: 0; margin-right: 15px; font-size: 1.3rem; }
            .logo span { display: none; }
            .nav-btn { padding: 10px 16px; font-size: 0.85rem; margin-bottom: 0; width: auto; gap: 8px; }
            .nav-btn span { display: inline; }
            .sidebar.collapsed .nav-btn span { display: inline; }
            .logout-btn { display: none; }
            .modal-card { width: 100% !important; border-radius: 24px; padding: 25px; }
            .modal-footer { grid-template-columns: 1fr; display: flex; flex-direction: column-reverse; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="login-overlay" class="hidden">
        <div class="login-card">
            <img src="/assets/logo.png" class="login-logo">
            <h2 style="font-weight: 800; margin-bottom: 30px; font-size: 1.8rem; letter-spacing: -1px;">Dragonz Admin</h2>
            <input type="email" id="login-email" placeholder="อีเมลแอดมิน" value="admin@dragonz.com" style="margin-bottom: 15px;">
            <input type="password" id="login-password" placeholder="รหัสผ่าน" style="margin-bottom: 30px;">
            <button class="btn btn-dark" style="width:100%; padding: 18px;" onclick="handleLogin()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="item-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 id="modal-title">แก้ไขข้อมูล</h2>
            <div id="modal-form-content"></div>
            <div class="modal-footer">
                <button class="btn btn-dark" style="justify-content: center;" onclick="closeModal()">ยกเลิก</button>
                <button class="btn btn-primary" style="justify-content: center;" onclick="saveModalItem()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <div id="dashboard-ui" class="hidden" style="display: flex; width: 100%; height: 100%;">
        <div class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
            <div class="logo"><img src="/assets/logo.png" class="logo-img"> <span>DRAGONZ</span></div>
            <button class="nav-btn" data-tab="orders" onclick="showTab('orders')">
                <img src="/assets/orders.png" class="menu-icon"> <span>รายการสั่งซื้อ</span>
            </button>
            <button class="nav-btn" data-tab="products" onclick="showTab('products')">
                <img src="/assets/products.png" class="menu-icon"> <span>จัดการสินค้า</span>
            </button>
            <button class="nav-btn" data-tab="partners" onclick="showTab('partners')">
                <img src="/assets/partner.png" class="menu-icon"> <span>พาร์ทเนอร์</span>
            </button>
            <button class="nav-btn" data-tab="categories" onclick="showTab('categories')">
                <img src="/assets/category.png" class="menu-icon"> <span>หมวดหมู่</span>
            </button>
            
            <div class="logout-btn">
                <div class="status-container" onclick="document.getElementById('log-console').classList.toggle('hidden')">
                    <span id="status-dot" class="status-dot" style="background: #cbd5e1;"></span>
                    <span>Log การเชื่อมต่อ</span>
                </div>
                <div id="log-console" class="hidden" style="background: #1e293b; color: #94a3b8; padding: 15px; border-radius: 15px; font-size: 0.65rem; max-height: 120px; overflow-y: auto; margin-bottom: 5px;">
                    <div id="log-content"></div>
                </div>
                <button class="btn" style="width: 100%; color: var(--slate-500); background: var(--slate-50); justify-content: center; padding: 12px 0;" onclick="logout()">
                    <img src="/assets/logout.png" class="logout-icon">
                    <span class="logout-text">ออกจากระบบ</span>
                </button>
            </div>
        </div>

        <div class="main">
            <div id="section-orders" class="hidden">
                <div class="header"><h1>รายการสั่งซื้อ</h1><button class="btn btn-dark" onclick="loadData()">รีเฟรช</button></div>
                <div id="orders-list"></div>
            </div>
            <div id="section-products" class="hidden">
                <div class="header"><h1>สินค้าทั้งหมด</h1><button class="btn btn-primary" onclick="openModal('products')">+ เพิ่มสินค้า</button></div>
                <div id="products-list"></div>
            </div>
            <div id="section-partners" class="hidden">
                <div class="header"><h1>ร้านค้าพาร์ทเนอร์</h1><button class="btn btn-primary" onclick="openModal('partners')">+ เพิ่มร้านใหม่</button></div>
                <div id="partners-list"></div>
            </div>
            <div id="section-categories" class="hidden">
                <div class="header"><h1>หมวดหมู่สินค้า</h1><button class="btn btn-primary" onclick="openModal('categories')">+ เพิ่มหมวดหมู่</button></div>
                <div class="item-grid" id="categories-list"></div>
            </div>
        </div>
    </div>

    <script>
        let db = { products: [], partners: [], categories: [], orders: [] };
        let activeModal = { type: '', id: null, data: {} };

        function showToast(m, t = 'success') {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast ${t}`;
            el.innerHTML = `<span>${t === 'success' ? '✅' : '❌'}</span> <span>${m}</span>`;
            c.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 3000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebar_collapsed', sidebar.classList.contains('collapsed'));
        }

        async function handleLogin() { 
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password})});
            const data = await res.json();
            if (data.success) { localStorage.setItem('dragonz_session', 'true'); location.reload(); } else showToast("อีเมลหรือรหัสผ่านไม่ถูกต้อง", "error");
        }

        function logout() { localStorage.clear(); location.reload(); }

        function addLog(msg, type = 'info') {
            const el = document.getElementById('log-content');
            if (!el) return;
            const color = type === 'error' ? '#f87171' : (type === 'success' ? '#34d399' : '#94a3b8');
            el.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('dragonz_session')) { 
                document.getElementById('dashboard-ui').classList.remove('hidden'); 
                if (localStorage.getItem('sidebar_collapsed') === 'true') document.getElementById('sidebar').classList.add('collapsed');
                const lastTab = localStorage.getItem('active_tab') || 'orders';
                loadData().then(() => showTab(lastTab)); 
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        });

        async function loadData() {
            let connected = true;
            for (let type of ['products', 'partners', 'categories', 'orders']) {
                try {
                    addLog(`กำลังโหลด ${type}...`);
                    const res = await fetch(`/api/${type}`);
                    db[type] = await res.json();
                    addLog(`โหลด ${type} สำเร็จ`, 'success');
                } catch(e) { db[type] = []; connected = false; addLog(`โหลด ${type} ล้มเหลว`, 'error'); }
            }
            const dot = document.getElementById('status-dot');
            if (dot) dot.style.background = connected ? '#10b981' : '#ef4444';
            renderAll();
        }

        function showTab(tabName) {
            localStorage.setItem('active_tab', tabName);
            ['orders','products','partners','categories'].forEach(t => {
                const sec = document.getElementById('section-'+t);
                if (sec) sec.classList.add('hidden');
                const btn = document.querySelector(`.nav-btn[data-tab="${t}"]`);
                if (btn) btn.classList.remove('active');
            });
            const activeSec = document.getElementById('section-'+tabName);
            if (activeSec) activeSec.classList.remove('hidden');
            const activeBtn = document.querySelector(`.nav-btn[data-tab="${tabName}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function openModal(type, id = null) {
            activeModal.type = type;
            activeModal.id = id;
            const modalBox = document.querySelector('.modal-card');
            if (type === 'products') modalBox.classList.remove('compact');
            else modalBox.classList.add('compact');

            if (id) {
                activeModal.data = JSON.parse(JSON.stringify(db[type].find(i => i.id == id)));
                document.getElementById('modal-title').innerText = `แก้ไข${getThai(type)}`;
            } else {
                const shopId = 'shop-' + Math.floor(100000 + Math.random() * 900000);
                activeModal.data = type === 'products' ? { id: Date.now(), name: '', price: 0, partnerIds: [], category: '', imageUrl: '', emoji: '🍹' } :
                                   type === 'partners' ? { id: shopId, name: '' } : { id: Date.now(), name: '', order_index: 0 };
                document.getElementById('modal-title').innerText = `เพิ่ม${getThai(type)}ใหม่`;
            }
            renderModalForm();
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function getThai(t) { return t==='products'?'สินค้า':t==='partners'?'พาร์ทเนอร์':'หมวดหมู่'; }
        function closeModal() {
            const modal = document.getElementById('item-modal');
            const card = modal.querySelector('.modal-card');
            modal.classList.add('closing');
            card.classList.add('closing');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('closing'); card.classList.remove('closing'); }, 300);
        }

        function renderModalForm() {
            const content = document.getElementById('modal-form-content');
            const d = activeModal.data;
            if (activeModal.type === 'products') {
                content.innerHTML = `<div class="preview-box" id="modal-preview">${d.imageUrl ? `<img src="${d.imageUrl}">` : d.emoji}</div><label>รูปสินค้า</label><input type="file" onchange="handleModalUpload(this)"><label>ชื่อสินค้า</label><input value="${d.name}" onchange="activeModal.data.name=this.value"><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px"><div><label>ราคา</label><input type="number" value="${d.price}" onchange="activeModal.data.price=Number(this.value)"></div><div><label>หมวดหมู่</label><select onchange="activeModal.data.category=this.value"><option value="">-- เลือก --</option>${db.categories.map(c => `<option value="${c.name}" ${d.category==c.name?'selected':''}>${c.name}</option>`).join('')}</select></div></div><label>ร้านที่แสดงผล</label><div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px">${db.partners.map(p => `<div class="partner-pill ${d.partnerIds.includes(p.id)?'active':''}" onclick="toggleModalPart('${p.id}', this)">${p.name}</div>`).join('')}</div>`;
            } else if (activeModal.type === 'partners') {
                content.innerHTML = `<label>รหัสร้าน (ID)</label><input value="${d.id}" oninput="activeModal.data.id=this.value" ${activeModal.id ? 'readonly' : ''}><label>ชื่อร้าน</label><input value="${d.name}" oninput="activeModal.data.name=this.value">`;
            } else {
                content.innerHTML = `<label>ชื่อหมวดหมู่</label><input value="${d.name}" onchange="activeModal.data.name=this.value"><label>ลำดับ</label><input type="number" value="${d.order_index}" onchange="activeModal.data.order_index=this.value">`;
            }
        }

        function toggleModalPart(id, el) {
            if (!activeModal.data.partnerIds) activeModal.data.partnerIds = [];
            const i = activeModal.data.partnerIds.indexOf(id);
            if (i > -1) { activeModal.data.partnerIds.splice(i, 1); el.classList.remove('active'); }
            else { activeModal.data.partnerIds.push(id); el.classList.add('active'); }
        }

        async function handleModalUpload(input) {
            if (!input.files[0]) return;
            const fd = new FormData(); fd.append('image', input.files[0]);
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) { activeModal.data.imageUrl = data.url; document.getElementById('modal-preview').innerHTML = `<img src="${data.url}">`; showToast('อัพโหลดรูปสำเร็จ'); }
        }

        async function saveModalItem() {
            const type = activeModal.type;
            const res = await fetch(`/api/${type}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(db[type].map(i => i.id == activeModal.data.id ? activeModal.data : i).concat(db[type].some(i => i.id == activeModal.data.id) ? [] : [activeModal.data])) });
            if (res.ok) { closeModal(); await loadData(); showToast('บันทึกสำเร็จ'); }
        }

        function renderAll() {
            const draw = (id, type, fn) => { 
                const el = document.getElementById(id);
                if (el) el.innerHTML = db[type].length === 0 ? '<div style="grid-column:1/-1;text-align:center;padding:50px;opacity:0.5">ไม่มีข้อมูล</div>' : db[type].map(fn).join(''); 
            };
            draw('products-list', 'products', p => `<div class="item-card" onclick="openModal('products','${p.id}')"><div style="display:flex;gap:12px;align-items:center"><div style="width:50px;height:50px;border-radius:10px;overflow:hidden;background:var(--slate-50);flex-shrink:0">${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover">` : p.emoji}</div><div style="flex:1"><div style="font-weight:800;font-size:0.9rem">${p.name}</div><div style="font-size:0.7rem;color:var(--slate-500)">฿${p.price} • ${p.category}</div></div><button class="btn btn-del" style="padding:8px" onclick="event.stopPropagation(); deleteItem('products','${p.id}')">🗑️</button></div></div>`);
            draw('partners-list', 'partners', p => `<div class="item-card" onclick="openModal('partners','${p.id}')"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:800;font-size:0.9rem">${p.name}</div><div style="font-size:0.7rem;opacity:0.6">${p.id}</div></div><button class="btn btn-del" style="padding:8px" onclick="event.stopPropagation(); deleteItem('partners','${p.id}')">🗑️</button></div></div>`);
            
            const catListEl = document.getElementById('categories-list');
            if (catListEl) {
                catListEl.innerHTML = db.categories.length === 0 ? '<div style="grid-column:1/-1;text-align:center;padding:50px;opacity:0.5">ไม่มีข้อมูล</div>' : db.categories.map(c => `<div class="item-card" data-id="${c.id}" onclick="openModal('categories','${c.id}')"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex; align-items:center; gap:15px"><div class="drag-handle" style="cursor:grab">☰</div><div><div style="font-weight:800;font-size:0.95rem">${c.name}</div><div style="font-size:0.7rem;opacity:0.6;font-weight:700">ลำดับที่: ${c.order_index || 0}</div></div></div><button class="btn btn-del" style="padding:8px" onclick="event.stopPropagation(); deleteItem('categories','${c.id}')">🗑️</button></div></div>`).join('');
                new Sortable(catListEl, { animation: 150, handle: '.drag-handle', onEnd: async function() {
                    const items = Array.from(catListEl.querySelectorAll('.item-card'));
                    const updated = items.map((el, index) => { const cat = db.categories.find(c => c.id == el.dataset.id); return { ...cat, order_index: index + 1 }; });
                    db.categories = updated; const res = await fetch('/api/categories', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(db.categories) });
                    if (res.ok) { showToast('จัดเรียงลำดับสำเร็จ!'); loadData(); }
                }});
            }
            const oList = document.getElementById('orders-list');
            if (oList) oList.innerHTML = db.orders.length === 0 ? '<div class="item-card" style="text-align:center;padding:50px;opacity:0.5">ไม่มีรายการสั่งซื้อ</div>' : `<div class="item-card" style="padding:0;overflow:hidden"><table><tr><th style="padding:15px">เวลา</th><th style="padding:15px">ร้าน</th><th style="padding:15px">ยอด</th><th style="padding:15px"></th></tr>${db.orders.map(o => `<tr><td style="padding:15px;font-size:0.8rem">${new Date(o.timestamp).toLocaleString('th-TH',{hour:'2-digit',minute:'2-digit'})}</td><td style="padding:15px;font-size:0.8rem">${o.partnerId}</td><td style="padding:15px;font-weight:800">฿${o.total}</td><td style="padding:15px"><button class="btn btn-del" style="padding:5px 10px;font-size:0.7rem" onclick="deleteItem('orders','${o.id}')">ลบ</button></td></tr>`).join('')}</table></div>`;
        }

        async function deleteItem(type, id) { if (confirm('ลบข้อมูลนี้?')) { await fetch(`/api/${type}/${id}`, {method: 'DELETE'}); loadData(); } }
    </script>
</body>
</html>
